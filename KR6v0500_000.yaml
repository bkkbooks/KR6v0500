front:
  text: 劉知幾史通卷五補注篇云亦有躬為史臣手自刋補雖志存該博而才闕倫敍除煩則意有所吝畢載則言有所妨遂乃定彼榛楛列為子注若羊衒之洛陽伽藍記之類是也四庫全書總目提要因謂則衒之此記實有自注世所行本皆無之不知何時佚脫然自宋以來未聞有引用其注者則其刋落已久今不可復考矣淸嘉慶間顧廣圻更推論曰知衒之原用大小字為分別今一概連寫是混注入正文矣廣圻乃有意仿全謝山治水經注之例改定一本卒以事未果而以此語長興朱資貴資貴從事經年悉心推究中間輟業未有所成資貴又以此語其娚吳若準若準於暇日流覽衒之此書意存復古重為分析所據者明如隱堂本所參考者為何氏毛氏校本復廣及水經注魏書太平御覽太平廣記法苑珠林等所引隻字片語咸為比較疑文訛句論斷獨伸遂乃條舉件繫成集證一卷附於書後復繪圖一幅冠於書前書成于道光十三年一八三三刋于十四年一八三四衒之自序謂今之所録止大伽藍若準此書即以寺為經各豫標舉提行頂寫寺外諸事概歸入自注另低一格展卷一覽本文子注朗若列眉伽藍記五卷胥依此法為之釐正末所附之集證除依別本校正文句外更兼採他書以作校證伽藍記沈霾千年明代諸刋本注混淆文句訛誤久成難讀之書若準此作始闢荊榛唯成於一人之手而以寺為經其餘胥入子注於是本文寥寥不逾千言子注數量竟過草倍矯枉未免過正其後乃有唐宴鉤沈張宗祥合校本出大體有鑑於若準之病茲據道光十四年校刻本景印洛陽伽藍記序魏撫軍府司馬楊衒之撰三墳五典之說九流百代之言竝理在寰區而義兼天下至於一乘二諦之原三明六通之旨西域備詳東土靡記自頂日感㝱滿月流光陽門飾豪之象夜臺圖紺髮之形邇來奔競其風遂廣至晉永嘉惟有寺四十二所逮皇魏受圖光宅嵩洛篤信彌繁法教逾盛王矦貴臣棄象馬如脫屣庶士豪家舍資財若遺蹟於是招提櫛比寶塔駢羅爭寫天上之姿競模山中之影金剎與靈臺比高宮殿共阿房等壯豈直木衣綈繡土被朱紫而已哉暨永熙多難皇輿遷鄴諸寺僧尼亦與時徙至武定五年歲在丁卯余因行役重覽洛陽城郭崩毀宮室傾覆寺觀灰燼廟塔丘墟牆被蒿艾巷羅荊棘野獸穴於荒階山鳥巢於庭樹游兒牧豎躑躅於九逵農夫耕稼藝黍於雙闕麥秀之感非獨殷墟黍離之悲信哉周室京城表裏凡有一千餘寺今日寥廓鐘聲罕聞恐後世無傳故撰斯記然寺數最多不可遍寫今之所録止大伽藍其中小者取其詳世諦事因而出之先以城內為始次及城外表列門名以遠近為五篇余才非箸述多有遺漏後之君子詳其闕焉大和十七年後魏高祖遷都洛陽詔司空公穆亮營造宮室洛陽城門依魏晉舊名東面有三門北頭弟一門曰建春門漢曰上東門阮籍詩曰步出上東門是也魏晉曰建春門高祖因而不改次南曰東陽門漢曰東中門魏晉曰東陽門高祖因而不改次南曰青陽門漢曰望京門魏晉曰青明門高祖改為青陽門南面有三門東頭弟一門曰開陽門初漢光武遷都洛陽作此門始成而未有名忽夜中有柱自來在樓上後琅琊郡開陽縣言南門一柱飛去使來視之則是也遂以開陽為名自魏及晉因而不改高祖亦然次西曰平昌門漢曰平門魏晉曰平昌門高祖因而不改次西曰宣陽門漢曰津門魏晉曰津陽門高祖因而不改西面有四門南頭弟一門曰西明門漢曰廣陽門魏晉因而不改高祖改為西明門次北曰西陽門漢曰雍門魏晉曰西明門高祖改為西陽門次北曰閶闔門漢曰上西門有銅璇璣玉衡以齊七政魏晉曰閶闔門高祖因而不改次北曰承明門承明者高祖所立當金墉城前東西大道遷京之始宮闕未就高祖住在金墉城城西有王南寺高祖數詣沙門論議故通此門而未有名世人謂之新門時王公卿士常迎駕於新門高祖謂御史中尉李彪曰曹植詩云謁帝承明廬此門宜以承明為稱遂名之北面有二門西頭曰大夏門漢曰夏門魏晉曰大夏門嘗造三層樓去地二十丈洛陽城門樓皆兩重去地百尺惟大夏門甍棟干雲東頭曰廣莫門漢曰穀門魏晉曰廣莫門高祖因而不改廣莫門以西至於大夏門宮觀相連被諸城上也一門有三道所謂九軌序元魏崛起朔漠奄有中原高祖賢明卜宅洛土聲明文物用夏變夷洵乎軼符秦而跨江左世宗忘其國恤崇尚釋氏太和政教為之一衰洎乎母后臨朝閹人用事外藩首禍變故迭興始則爾朱氏張卓莽之凶焰繼則賀六渾效曹馬之故智至永熙遷鄴而魏祚移矣撫軍府司馬楊衒之慨念故都傷心禾黍假佛寺之名志帝京之事凡夫朝家變亂之端宗藩廢立之由藝文古蹟之所關苑囿橋梁之所在以及民間怪異外夷風土莫不巨細畢陳本末可觀足以補魏收所未備為拓跋之別史不特遺聞逸事可資學士文人之考核已也其敘録伽藍始于閶闔宮前西則永胡統逶而西則為建中長秋瑤光也東則景樂逶而東則為昭儀修梵嵩明也其南則景林也其中小寺則願會光明司農也由是而及城外建春門則明懸龍華瓔珞也而宗聖崇真魏昌景興太康以次記焉東陽門則莊嚴秦太上君正始也青陽門則平等景也而歸覺附記焉由東而南開陽門則報德也龍華追聖在其東而文覺三寶遠正覺以次記焉宣陽門則東有景明大統而西有高陽王寺也而招福雙女永橋之歸正菩提城西之崇虛以次記焉由南而西西明門則沖覺也西陽門則宣忠白馬光寶法雲也而王典御開善以次記焉壽邱里中則又有追光寺也閶闔門則永明也大覺在其西而融覺在其東也由西而北則大夏門有禪虛也廣莫門有凝圓也此其次弟也昔劉知幾言衒之此記定彼榛枯列為子注後人合并不可復辨暇日流覽意存復古忘其淺陋重為分析古本既無由見未必一如舊觀而綱目粗具讀是書者或有取乎圖一篇集證一卷附於簡端卷末世之君子糾其謬焉道光十三年十二月既望錢塘吳若準自序若準字次平一字耘石菘圃相國之孫居平湖北門內之趙家濵少孤奮志力學長於考據兼通六法成道光辛丑進士視學江西卒於任洛陽伽藍記圗
