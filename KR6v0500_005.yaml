記無侍字范友明家奴友明廣記作明友死者曰廣記作答曰家在城西阜財里阜何作準無所食也廣記無也字或遇飯食飯廣記作飲如似夢中廣記無似字門下録事張秀攜秀攜二字當從法苑珠林廣記作雋字下同詣準財里準廣記作阜果有崔暢有何作得秀攜問暢曰秀攜當從廣記作雋有息子涵何本作有一息字子涵毛本無一字年十五而死死法苑珠林廣記作亡秀擕曰當作雋曰在華林園中主人故遣我來問廣記作主上在華林園遣我來問是人字當從各本及法苑珠林廣記作上字秀攜還以實陳聞秀攜二字當從法苑珠林作一雋字還廣記作具后遣攜送涵回家廣記無攜字謂曰廣記作拒之曰急手速去急手何本作急急廣記無手字遊於京師京師何作京巷法苑珠林作遊於京師巷內黃衣一具具廣記作通法苑珠林同不敢仰視廣記作不仰視天及兵刃之屬兵刃毛本作刀兵遇疲則止各本無遇字奉終里奉字上廣記有一有字多賣送死人之具何本無多字廣記無人字勿以桑木為欀欀當從法苑珠林及廣記作榱見人發鬼兵廣記無人字法苑同訴稱是柏棺法苑珠林廣記無訴字主兵吏曰廣記無主字法苑珠林有貨涵發此等之言也何本及法苑珠林無等之二字龍華寺給輿羽葆鼓吹輿字各本及廣記皆無白殿丹楹殿廣記作壁楹各本作檻飛簷反宇反何作峻毛作仄廣記作華羅衣從風衣廣記作綺諸王豪侈未之有也何本無之字鳴騶夾道夾廣記作御雍嗜口味味廣記作食性多儉吝吝廣記作吝亦常無肉各本及廣記作常無肉味止有韭菹菹何作薤有字下廣記有韭茹二字崇客李元祐客字上廣記有家字二九一十八二九何作二韭廣記一字無世人即以為譏罵何本無為字善彈箜篌廣記作能彈臥箜篌能為明妃出塞之曲歌曲字各本無廣記無能字歌字曲作聲豔姿善火鳳舞火各本作么善字上各本有尤字下有為字廣記作善為逐鳳舞並愛傾後室室疑宮字之誤常令徐鼓緑水火鳳之曲焉常字上各本俱有逐字火廣記作文荀潁子文各本並作潁川荀子文荀生住在何處何本無在字問才曰何往曰往城南各本俱作才曰何為住城南城南有四夷館夷字下何本有里字信非虛言也言字何本無即漢之躍龍閣也閣各本作園字室華蓋之座室當從各本作設高陽王寺城西卷第四土山釣臺臺何作池斜峰入牖牖何作墉並選雋俊俊何作民至於清晨明景明何作美使梁王愧兔園之遊園何作苑太子還總萬幾子當從各本作后拔清河國令何本國字下有郎中二字案魏書百官志有矦伯國郎中令何本殆據之以增此也從王國三卿為執戟者從當從各本作徙沖覺寺侍中司州牧城陽王所立也王字下各本有巖字永康中康當從各本作安婦生産子何本作婦生産子毛本作婦人産子遣徽特至太原王弟特何本作馳詔毛作特詔連索酒飲之何本無連字祖仁一門刺史何本無祖仁二字皆是徽之將將字下各本有校字少有舊恩少各本作以故往投之何本無故字時聞爾朱兆募城陽王甚重時何作始我有黃金二百斤何本無黃字祿位隆重祿位何本作位望盡送致兆何本無致字猶不滿數滿毛作充積禍之門禍何作惡殃所畢集何作餘殃所集徽即托夢增金馬增字下各本有徽字雖魏矦之笞田蚡魏字下何本有其字閹官楊王桃湯所立也案魏書閹官傳王溫字桃湯陽字當從各本衍惟桃湯所建僧寺所建何作獨造世人稱英雄何作之工踰昭義義字疑儀字之訛最為入室入室各本作人寶宣忠寺寺在西陽門外三里御道南寺字當衍項背日月光明金神號曰佛金何作胡時白馬負而來負字下何本有經字自此從後從當從各本作以形貌醜陋醜廣記作寢不可解解字上廣記有一得字胡太后聞之廣記無聞之二字時亦有洛陽人各本及廣記無亦字當有爵否何本作當有官爵廣記無否字經十餘日各本及廣記作經月餘法和父喪喪廣記作亡大竹者杖當從廣記作大竹箭者苴杖造十二辰歌造字上何本及廣記有一初字白馬寺盡皆湮滅湮何作埋惟此寺獨存惟字下何本有有字此是浴室室何本作堂當時園池平衍池當從何本作地葭菼被𡶨菼何本作芙雍西刺史西各本作州光寶寺僧摩羅所立也僧各本作曇隔院並門院各本作牆凡聞見凡字下各本有所字作祗洹寺一所何本無寺字丹素發彩素毛作青發毛作炫花果蔚茂花何作珍嘉木被庭木毛作樹閻浮所無無字下何本有也字侍中尚書令何本無令字辨慧清恬恬各本作悟萬國齊珍珍何作臻金蟬耀首金蟬何作貂蟬春風扇揚揚毛作柳誤莫不飲其元奧飲何作領荊州秀才張裴裳為五言裳字下各本有常字異秋花共色秋當從各本作林子明八日而醉眠日當從各本作斗市南有皇女臺南字上何本有東字臺中有侍中矦釗宅釗考魏書當從各本作剛足迹所履足何作人市南有調音樂律二里律何作肆有田僧超者廣記無者字善吹笳善廣記作能能為壯士歌廣記無能字虐吏充斥虐當從各本作虎朝廷為旰食為字下各本有之字僧超吹壯士笛曲於後笛字下何本有歌字威名早著早何作卓二十餘年二何作三攻無全城全何本作牢誤廷伯每臨場場何本作陳廣記作敵單馬入陳句上何本有延伯二字威鎮戎豎鎮何作振射僧超亡射何作中謂伯牙之失鍾子期何本無子字善能釀酒能廣記作於時暑赫晞晞何作曦廣記作劉屬下句其酒不動其酒廣記作酒味飲之香美而醉而字各本在醉字下屬下句讀經月不醒廣記作而不易醒京師朝貴多出郡登藩廣記作京師朝貴出郡者以其遠至廣記作以其可至遠亦曰騎驢酒曰各本及廣記皆作名永熙年中廣記無年字齋酒之藩藩廣記作任逢路盜賊何本作路逢劫盜賊賊字屬下句廣記作中夜逢劫盜飲之即醉廣記作盜飲之皆醉皆被禽獲被廣記作備因復命禽姦酒因字下何本及廣記皆有一此字命何本作為廣記作名市北慈孝奉終二里北字下毛本有有字里內之人何本無之字有挽歌孫巖歌字下廣記有者字巖因怪之因廣記作私似野狐尾廣記無野字妻臨去妻廣記作甫鄰人追之追毛作逐廣記同變成一狐成廣記作為行路人見而悅近之行字下廣記有於道二字無近字何本作行於道路人見而悅之皆被截髮何本及廣記皆字上有行者二字廣記無皆字當時有婦人著綵衣者廣記無有字皆指為狐魅廣記無皆字四月有此至秋乃止至字何本在此字上層樓各本作對出不聽金銀錦繡不字上何本有議字更納河內人法苑珠林引無人字英聞梁氏嫁法苑珠林引無氏字卿忘我也法苑珠林引也作耶子集驚怖怖法苑珠林作怪亦變為茅馬為法苑珠林作成盡化為蒲人法苑珠林無化字舍宅為寺舍宅法苑珠林作遂舍可高丈餘丈法苑珠林及廣記作尺擬為金色為字上法苑珠林及廣記有貨字今取卿兒醜多醜何作丑以償金色焉償法苑珠林及廣記作充焉毛本及廣記作馬氏法苑同二字屬下句心不遑安法苑珠林及廣記作而心不安慶年五十十字下法苑珠林及廣記有餘字象自然金色然何作有廣記作象忽自然金色一里之內一廣記作鄰法苑同皆來觀覩覩廣記作矚下有焉字遂改準財里毛本無里字皇宗所立也立毛本作居縹囊紀慶縹各本作珠擅出海之富擅廣記作阻洞戶連房洞廣記作阿高臺芳樹樹當從毛本作榭常與高陽爭衡衡何作行以金五色績為繩績何作續毛本無金字色字下有絲字廣記作以五色絲為繩在山谷為寇也也廣記作耶即相率歸降廣記無即字琛在秦州州廣記作中號曰追風赤驥何本無驥字其次有七百里者其字各本無廣記同者何本作馬琛常語人各本俱無常字廣記有晉室石崇何本無晉室二字畫卯雕薪卯各本作茆桉杜臺卿玉燭寶典寒食城市多鬥雞卵之戲出古之豪家食稱畫卵今代猶染藍茜加雕鏤遞相餉遺此卯字當從廣記作卵金瓶銀甕百餘口甌檠盤盒稱是自餘此十五字何本錯簡在皆從西域而來句下自餘酒器自廣記作其何本無酒器二字繡纈油綾絲綵越葛錢絹等不可勝計廣記無此十五字纈何作緹絹字下有布字計何作數三日不起起字上廣記有能字江陽王繼來省疾何本脫王字謂曰廣記作論之曰寶貨多融多字下何本及廣記有一於字繼笑曰廣記無笑字錢絹露積於廊者者廣記作廡間賜百官負絹何本無負字任意自取取廣記作量負絹過性性當從廣記作任蹶倒傷踝此句下廣記有太后即不與之今其空出時人笑焉十四字太后問侍中何少問字下廣記有曰字寶塔高凌凌何本作臨廣記作壯四月初八日初當從何本及廣記衍京師士女師廣記作都亦不是過過字下廣記有也字樹出雲各本作高法雲寺欲起義兵欲何作故逃命江右右各本作左臣在本朝之日在字何本無鴛鸞接翼鸞何作鴦敘録存歿敘何作收凡見敬禮如親比親各本作此句斷以此字屬下句非是今便言旋闕下闕下何作詣闕然國既邊地何本無既字追光寺傳之於西域毛本無之字沙門常東向遙禮之沙字上各本重有西域二字融覺寺禪皋顯敞禪當從何本作神是以溫子升云升字下當從各本有碑字大覺寺適茲藥土藥當從何本作樂毛作洛非故立此寺以憩之寺字下何本有一俾字簷拂高松松何作樬盡天地之西垂垂當從何本作陲今始有沙門焉子善提拔陀善各本作菩毛本無焉子二字陀字下有至焉二字自云北行一月日何本無日字北行十一日一何作二最為強大何本無強字民戶殷多殷字下何本有富字以多字屬下句沙門問其南方風俗沙門二字上何本重有京師二字亦與西國大秦安息身毒諸國西國之國字當從各本作域浮浪乘風浪何本作海愛人好事事何本作士夙善元言夙何本作尤安置佛徒佛何本作僧暉遂造人中夾貯象一軀貯當是紵之訛其年冬而京師遷鄴何本無而字永明寺城北卷第五有羽林馬僧相善抵角戲何本無有字虎賁張車車字下何本有渠字桉魏書靈后補傳太后從子都統僧敬與備身左右張車渠等數十人謀殺乂復奉太后臨朝則此當從何本補一渠字也宣武場場字下何本有在字禪虛寺凝圓寺圓何本作𢆯閹官濟州刺史賈璨所立也璨何作燦桉魏書閹官傳作粲注即漢太上王廣處此處疑有脫誤洛陽城東北有上高景景字各本作里字此誤也洛陽城東北上高里陽字當從各本衍李元謙樂雙聲語樂何作能是誰弟宅過佳過佳何作遇值毛作遇佳皆誤凡婢雙聲凡古音芃故曰雙聲何本作此誤神龜元年桉釋者志惠生使西域在熙平十年唯土谷渾城左右土當從各本作吐下同土谷渾所吞吞何作居誤今城是土谷渾弟二息城字下各本俱有內主二字中國佛與菩薩各本作城國各本作圖戶人有患戶人何作人戶即得陰愈何本無即字及諸宮塔宮何作象幅上隸書幅各本作幡云太和十九年云字上各本有多字唯有一幅幅各本作幡是姚秦時幡秦何作興太平御覽亦作興居喪者翦髮劈面以為哀戚髮長四寸劈當是剺字之訛四何本作五廣記無劈面以為哀戚髮七字有商將一比邱商字下何本有胡字石毗盧旃石當從各本作名今輒將吳國沙門來吳各本作異王言令我見佛言毛作曰令覆甕之影何作今之覆瓦之影非皮非何本作非皮綵毛作繪案于闐境境字上各本有國字五穀甚豐穀何作果訛也食則麴麥麴麥何作麥麩文字與波羅門同波何本作婆入漢槃陀國漢李延壽北史西域傳作渴至鉢盂城桉北史西域傳鉢盂作鉢和下波斯國作波知國烏場國作烏萇國乾陀羅無羅字又上朱駒國作朱居國殆梵音無定字也復呪池龍何本作就池呪龍即徙之蔥嶺山即字上何本有王字長坂千里長何作危方此則夷方何作對依約中下下何作夏水皆西流此句下何本有入西海三字廣記與此同人民決水以種人字上廣記有其上二字以何作而聞中國國字下各本有田字天何由可共期也廣記無共字天氣已冷冷何作寒十月之初之初何作初旬至喝噠國至何作入喝當從何本及魏書作嚈以氊為屋屋何作衣皆來朝賀賀何作貢王張大氊張何本作居以四金鳳皇為牀腳何本無四字頭帶一角帶各本作戴團圓垂下垂下各本作下垂境土甚狹何本無土字多致難艱難艱當從各本作艱難此國漸出蔥嶺何本無此國二字望風謝路耳何本無耳字國王精食食各本作進唯從空山從當從各本作徙國王見宋雲云大魏使來璜川吳氏本作國王見大魏使宋雲來龍王瞋怒怒何作恚非直條縫明見縫何本作縱至於細縷亦新新當從各本作彰王城北八十里八十何作十八若水踐泥水何本作以金象六千軀千何作十如來苦行投身餓虎之處餓毛本作餵溫熾已扇熾何作風矚此芳景矚何作屬目入神定目當從各本作因以金傅之何作以金箔帖之隔小嶺小毛本作山遂立敕勤為王勤當從各本作勒好祀鬼神祀何作事手持刀持何作捉莫能責之莫何作未宋雲曰曰字上各本有一答字遠求經典典何作論未敢言疲言何作告不無頓弊頓何作損宋雲初謂王是夷人不可以禮責何本謂作見不字上有謂字冰有大小冰當從各本作水我見魏主則拜我字下何本有一親字我一坐讀書一各本作亦時跋跋提國各本少一跋字與乾陀羅王何本無羅字復西行三月月何作日至辛頭河頭字下各本有大字十二年各本作中復西行十三日何本無十字推其本源源法苑珠林引作緣與弟子遊化此土弟字上法苑珠林有一諸字我入涅槃三百年三何作二此處起浮圖此字上法苑珠林有一在字二百年來二何作三纍牛糞為塔纍當從法苑珠林作壘王怪此童子句下何本有即此童子四字然後止法苑珠林作然後始定王始更廣塔基法苑珠林無始字從此構木此法苑珠林作地階砌櫨栱櫨何作楹上有鐵柱柱何作棖高三尺法苑珠林作高三百尺糞塔如初塔何作垢在大塔南三步三步法苑珠林作三百步婆羅門不信是糞法苑珠林婆字上有時有二字以手探看看法苑珠林作之天火所燒所當從法苑珠林作七無有能上者有何作由無者字悉在上在字下何本有樓字塔內物事物當從何本作佛旭日始開開何作升覆於其上於字何本在下句後字上則有禍變則何本及御覽並作即其形正圓圓法苑珠林作直高二丈高字上法苑珠林有舉字能與世人表吉凶表何作報表字下法苑珠林有作字凶字下有之徵二字觸之若吉觸字上法苑珠林有以指二字錦香袋五百枚袋當從何本作囊王公卿幡卿字下何本有士字以銅摹寫銅何作鍮須禁日取之禁何作藥誤至那迦羅阿國阿何作訶值有動各本並作重時二人勝之二當從何本作一見佛影入山窟十五步入山二字何本在窟字下近看暝然不見何本無不見二字始見容顏挺特見字下何本有其相二字窟前有方石何本無有字山下有六佛六各本作大并為七塔七何本作大塔南石銘云塔字上毛本有七字凝圓寺正光二年桉魏書釋老志惠生於正光三年冬還京師戶十萬九千餘九何作六劉長秋毛本作寺嵩高中有闕居寺闕當從何本作間
